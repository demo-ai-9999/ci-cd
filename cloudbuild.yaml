substitutions:
  _REGION: asia-northeast3
  _ARTIFACT_REPOSITORY: gen-ai-demo
  _IMAGE_NAME: ci-cd-backend
  _SERVICE_NAME: ci-cd-backend
  _RUNTIME_SERVICE_ACCOUNT: cloud-run-runtime@test-sideno.iam.gserviceaccount.com

steps:
  # 1. Backend 테스트
  - name: python:3.10-slim
    entrypoint: bash
    args:
      - -c
      - |
        cd backend
        pip install --no-cache-dir -r requirements.txt
        PYTHONPATH=. pytest -q

  # 2. Docker 이미지 빌드
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - backend/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA
      - ./backend

  # 3. Artifact Registry로 Push
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA

  # 4. Cloud Run 배포
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --service-account=${_RUNTIME_SERVICE_ACCOUNT}
      - --allow-unauthenticated
      - --ingress=all
      - --cpu=1
      - --memory=512Mi
      - --timeout=300
      - --min-instances=0
      - --max-instances=3
      - --set-env-vars=ENV=prod,GCP_PROJECT_ID=$PROJECT_ID

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_ARTIFACT_REPOSITORY}/${_IMAGE_NAME}:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
